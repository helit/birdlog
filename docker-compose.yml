services:
  db:
    image: postgres:15
    container_name: birdlog-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: birdlog
      POSTGRES_PASSWORD: birdlog
      POSTGRES_DB: birdlog
    volumes:
      - birdlog-data:/var/lib/postgresql/data

volumes:
  birdlog-data:
